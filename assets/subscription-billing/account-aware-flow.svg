<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Account-aware billing skill flow</title>
  <desc id="desc">A system flow showing how a billing question moves through permission checks, account lookup, bill history, explanation, and handoff.</desc>
  <rect width="1200" height="760" fill="#f8f9fa"/>
  <rect x="60" y="60" width="1080" height="640" rx="18" fill="#ffffff" stroke="#dfe3e8"/>
  <text x="100" y="126" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="900" fill="#1f1f1f">After: answer the charge, not the page path</text>
  <text x="100" y="166" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="650" fill="#5f6368">The skill changed the agent from generic help to grounded account-aware explanation.</text>

  <g transform="translate(100 235)">
    <rect width="180" height="160" rx="16" fill="#e8f0fe" stroke="#c6d7ff"/>
    <text x="24" y="44" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="900" fill="#315bea">1. Intent</text>
    <text x="24" y="83" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="850" fill="#1f1f1f">Unexpected</text>
    <text x="24" y="112" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="850" fill="#1f1f1f">charge</text>
    <text x="24" y="142" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="650" fill="#5f6368">Why was I charged?</text>
  </g>
  <path d="M300 315 H360" stroke="#315bea" stroke-width="5" stroke-linecap="round"/>
  <path d="M350 303 L366 315 L350 327" fill="none" stroke="#315bea" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

  <g transform="translate(380 235)">
    <rect width="180" height="160" rx="16" fill="#e6f4ea" stroke="#b7dfc0"/>
    <text x="24" y="44" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="900" fill="#137333">2. Permission</text>
    <text x="24" y="83" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="850" fill="#1f1f1f">Admin-safe</text>
    <text x="24" y="112" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="850" fill="#1f1f1f">access</text>
    <text x="24" y="142" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="650" fill="#5f6368">Show only allowed data</text>
  </g>
  <path d="M580 315 H640" stroke="#315bea" stroke-width="5" stroke-linecap="round"/>
  <path d="M630 303 L646 315 L630 327" fill="none" stroke="#315bea" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

  <g transform="translate(660 235)">
    <rect width="180" height="160" rx="16" fill="#fff7df" stroke="#f3d485"/>
    <text x="24" y="44" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="900" fill="#9a5b00">3. Tools</text>
    <text x="24" y="83" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="850" fill="#1f1f1f">Plan + bill</text>
    <text x="24" y="112" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="850" fill="#1f1f1f">history</text>
    <text x="24" y="142" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="650" fill="#5f6368">MCP + APIs</text>
  </g>
  <path d="M860 315 H920" stroke="#315bea" stroke-width="5" stroke-linecap="round"/>
  <path d="M910 303 L926 315 L910 327" fill="none" stroke="#315bea" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

  <g transform="translate(940 235)">
    <rect width="180" height="160" rx="16" fill="#ece7ff" stroke="#d2c5ff"/>
    <text x="24" y="44" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="900" fill="#5f2eea">4. Explain</text>
    <text x="24" y="83" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="850" fill="#1f1f1f">What changed</text>
    <text x="24" y="112" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="850" fill="#1f1f1f">and why</text>
    <text x="24" y="142" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="650" fill="#5f6368">No speculation</text>
  </g>

  <g transform="translate(165 470)">
    <rect width="870" height="112" rx="16" fill="#f8f9fa" stroke="#dfe3e8"/>
    <text x="30" y="44" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="900" fill="#1f1f1f">Model behavior rule</text>
    <text x="30" y="78" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="650" fill="#3c4043">Never speculate about a charge. Fetch account context, match the amount, explain the line items, then route only when the data cannot answer.</text>
  </g>
</svg>
