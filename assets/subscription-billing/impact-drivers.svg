<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Subscription billing support impact snapshot</title>
  <desc id="desc">A public-safe chart summarizing billing, refunds, and cancellation support volume and satisfaction signals.</desc>
  <rect width="1200" height="760" fill="#f8f9fa"/>
  <rect x="60" y="60" width="1080" height="640" rx="18" fill="#ffffff" stroke="#dfe3e8"/>
  <text x="100" y="130" font-family="Inter, Arial, sans-serif" font-size="42" font-weight="800" fill="#1f1f1f">A high-volume trust problem</text>
  <text x="100" y="174" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="600" fill="#5f6368">Billing, refund, and cancellation contacts were among the lowest-satisfaction support drivers.</text>

  <g transform="translate(100 230)">
    <rect width="1000" height="92" rx="14" fill="#e8f0fe"/>
    <text x="30" y="38" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800" fill="#315bea">ADDRESSABLE CLUSTER</text>
    <text x="30" y="72" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="900" fill="#1f1f1f">1M+ annual support contacts</text>
    <text x="610" y="72" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800" fill="#315bea">~16% of total contacts</text>
  </g>

  <g transform="translate(100 370)">
    <rect width="300" height="210" rx="14" fill="#ffffff" stroke="#dfe3e8"/>
    <text x="24" y="42" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800" fill="#315bea">INTUIT REFUNDS</text>
    <text x="24" y="96" font-family="Inter, Arial, sans-serif" font-size="46" font-weight="900" fill="#1f1f1f">250K+</text>
    <text x="24" y="136" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800" fill="#d93025">mid-50s tNPS</text>
    <rect x="24" y="162" width="210" height="16" rx="8" fill="#fad2cf"/>
    <rect x="24" y="162" width="112" height="16" rx="8" fill="#d93025"/>
  </g>

  <g transform="translate(450 370)">
    <rect width="300" height="210" rx="14" fill="#ffffff" stroke="#dfe3e8"/>
    <text x="24" y="42" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800" fill="#315bea">BILLING ISSUES</text>
    <text x="24" y="96" font-family="Inter, Arial, sans-serif" font-size="46" font-weight="900" fill="#1f1f1f">130K+</text>
    <text x="24" y="136" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800" fill="#d93025">mid-50s tNPS</text>
    <rect x="24" y="162" width="210" height="16" rx="8" fill="#fad2cf"/>
    <rect x="24" y="162" width="118" height="16" rx="8" fill="#d93025"/>
  </g>

  <g transform="translate(800 370)">
    <rect width="300" height="210" rx="14" fill="#ffffff" stroke="#dfe3e8"/>
    <text x="24" y="42" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800" fill="#315bea">CANCEL</text>
    <text x="24" y="96" font-family="Inter, Arial, sans-serif" font-size="46" font-weight="900" fill="#1f1f1f">380K+</text>
    <text x="24" y="136" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800" fill="#d93025">low-60s tNPS</text>
    <rect x="24" y="162" width="210" height="16" rx="8" fill="#fad2cf"/>
    <rect x="24" y="162" width="130" height="16" rx="8" fill="#d93025"/>
  </g>

  <text x="100" y="638" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#5f6368">Public-safe recreation from internal support contact-driver analysis. Values rounded/ranged.</text>
</svg>
