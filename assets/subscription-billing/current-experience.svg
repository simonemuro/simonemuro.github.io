<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Current AI support response pattern</title>
  <desc id="desc">A recreated screenshot-style visual showing generic AI responses to account-specific billing questions.</desc>
  <rect width="1200" height="760" fill="#f8f9fa"/>
  <rect x="70" y="60" width="1060" height="640" rx="18" fill="#ffffff" stroke="#dfe3e8"/>
  <text x="110" y="126" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="900" fill="#1f1f1f">Before: the agent answered the wrong question</text>
  <text x="110" y="166" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="650" fill="#5f6368">The customer needed an explanation for the charge. The system gave generic navigation and possibilities.</text>

  <g transform="translate(110 230)">
    <rect x="450" y="0" width="470" height="58" rx="29" fill="#e9eef3"/>
    <text x="482" y="37" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700" fill="#3c4043">I have a charge on my credit card I don't understand.</text>
    <rect x="0" y="110" width="720" height="180" rx="16" fill="#ffffff" stroke="#dfe3e8"/>
    <text x="28" y="152" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800" fill="#5f6368">AI RESPONSE</text>
    <text x="28" y="194" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800" fill="#1f1f1f">Could you provide more details?</text>
    <text x="28" y="232" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="600" fill="#5f6368">Amount, date, merchant, description on the statement...</text>
    <text x="28" y="268" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="600" fill="#5f6368">Or search your own transactions in QuickBooks.</text>
  </g>

  <g transform="translate(110 550)">
    <rect width="310" height="82" rx="14" fill="#fce8e6"/>
    <text x="22" y="35" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="900" fill="#b3261e">Missed data</text>
    <text x="22" y="62" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="650" fill="#5f6368">No account lookup</text>
    <rect x="345" width="310" height="82" rx="14" fill="#fce8e6"/>
    <text x="367" y="35" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="900" fill="#b3261e">Missed intent</text>
    <text x="367" y="62" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="650" fill="#5f6368">Why, not where</text>
    <rect x="690" width="310" height="82" rx="14" fill="#fce8e6"/>
    <text x="712" y="35" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="900" fill="#b3261e">Trust risk</text>
    <text x="712" y="62" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="650" fill="#5f6368">More work for customer</text>
  </g>
</svg>
