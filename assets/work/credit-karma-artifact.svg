<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">Credit Karma recommendation artifact</title>
  <desc id="desc">Public-safe product preview showing a card recommendation explanation that uses approval likelihood internally without exposing it.</desc>
  <rect width="1400" height="900" fill="#fbf8f1"/>
  <text x="90" y="82" fill="#29323a" font-family="Arial, sans-serif" font-size="46" font-weight="700">Credit Karma recommendation</text>
  <text x="90" y="136" fill="#68737d" font-family="Arial, sans-serif" font-size="28">Model-written explanation · approval signal hidden</text>
  <line x1="90" y1="180" x2="1310" y2="180" stroke="#d9d2c4" stroke-width="3"/>
  <rect x="90" y="235" width="500" height="555" rx="34" fill="#fff" stroke="#ddd6c7" stroke-width="3"/>
  <text x="130" y="286" fill="#29323a" font-family="Arial, sans-serif" font-size="29" font-weight="700">Recommended for your wallet</text>
  <rect x="130" y="345" width="420" height="130" rx="24" fill="#113c37"/>
  <text x="160" y="392" fill="#fff" font-family="Arial, sans-serif" font-size="36" font-weight="700">Everyday Cash Card</text>
  <text x="160" y="438" fill="#d6f3e8" font-family="Arial, sans-serif" font-size="21">$0 annual fee · grocery + gas rewards</text>
  <g font-family="Arial, sans-serif">
    <circle cx="150" cy="542" r="15" fill="#0f8f6d"/>
    <text x="180" y="540" fill="#29323a" font-size="22" font-weight="700">Matches spending categories</text>
    <text x="180" y="570" fill="#68737d" font-size="18">uses grocery + gas profile</text>
    <circle cx="150" cy="616" r="15" fill="#0f8f6d"/>
    <text x="180" y="614" fill="#29323a" font-size="22" font-weight="700">Clear reason, no odds leak</text>
    <text x="180" y="644" fill="#68737d" font-size="18">does not imply approval chance</text>
    <circle cx="150" cy="690" r="15" fill="#0f8f6d"/>
    <text x="180" y="688" fill="#29323a" font-size="22" font-weight="700">Safe fallback</text>
    <text x="180" y="718" fill="#68737d" font-size="18">no claim if evidence is weak</text>
  </g>
  <rect x="660" y="235" width="645" height="555" rx="34" fill="#fff" stroke="#ddd6c7" stroke-width="3"/>
  <text x="705" y="286" fill="#29323a" font-family="Arial, sans-serif" font-size="29" font-weight="700">Synthetic profile eval</text>
  <g font-family="Arial, sans-serif">
    <g fill="#f7faf8" stroke="#d7e7df" stroke-width="2">
      <rect x="705" y="345" width="150" height="70" rx="16"/><rect x="895" y="345" width="150" height="70" rx="16"/><rect x="1085" y="345" width="150" height="70" rx="16"/>
      <rect x="705" y="450" width="150" height="70" rx="16"/><rect x="895" y="450" width="150" height="70" rx="16"/><rect x="1085" y="450" width="150" height="70" rx="16"/>
      <rect x="705" y="555" width="150" height="70" rx="16"/><rect x="895" y="555" width="150" height="70" rx="16"/><rect x="1085" y="555" width="150" height="70" rx="16"/>
    </g>
    <g font-size="20" font-weight="700" fill="#29323a">
      <text x="725" y="373">Profile A</text><text x="915" y="373">Profile B</text><text x="1105" y="373">Profile C</text>
      <text x="725" y="478">Profile D</text><text x="915" y="478">Profile E</text><text x="1105" y="478">Profile F</text>
      <text x="725" y="583">Profile G</text><text x="915" y="583">Profile H</text><text x="1105" y="583">Profile I</text>
    </g>
    <g font-size="18" fill="#0f8f6d">
      <text x="725" y="398">ideal</text><text x="915" y="398">ideal</text><text x="1105" y="398">pass</text>
      <text x="725" y="503">ideal</text><text x="915" y="503">pass</text><text x="1105" y="503">ideal</text>
      <text x="725" y="608">ideal</text><text x="915" y="608" fill="#9a6a1d">acceptable</text><text x="1105" y="608" fill="#9a6a1d">acceptable</text>
    </g>
  </g>
  <rect x="705" y="690" width="490" height="45" rx="22" fill="#eef7f3" stroke="#b9dcca" stroke-width="2"/>
  <text x="950" y="721" fill="#0f4f43" font-family="Arial, sans-serif" font-size="20" text-anchor="middle">0 approval-odds disclosure strikes</text>
</svg>
