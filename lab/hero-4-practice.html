<!doctype html>
<html lang="en">
<head>
<meta name="robots" content="noindex">
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Hero 4 · What I Do, In Motion</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500&family=Newsreader:ital,opsz,wght@1,6..72,400;1,6..72,500&display=swap" rel="stylesheet" />
<style>
  :root {
    --paper: #faf9f6;
    --card: #ffffff;
    --ink: #1a1815;
    --muted: #6b6660;
    --faint: #9b958c;
    --hairline: #e5e1da;
    --persimmon: #e8552f;
    --signal: #1b7f5c;
    --sans: "Geist", system-ui, -apple-system, sans-serif;
    --mono: "Geist Mono", ui-monospace, SFMono-Regular, monospace;
    --serif: "Newsreader", Georgia, serif;

    /* animatable custom props for kinetic fills */
    --flow-dash: 0;
  }
  @property --flow-dash {
    syntax: "<number>";
    inherits: false;
    initial-value: 0;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    background: var(--paper);
    color: var(--ink);
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    display: grid;
    place-items: center;
    min-height: 100vh;
    padding: 40px 20px;
  }

  /* ---------- the card ---------- */
  .practice {
    width: min(100%, 446px);
    border: 1px solid var(--hairline);
    border-radius: 16px;
    background: var(--card);
    box-shadow: 0 1px 2px rgba(26,24,21,.04), 0 12px 40px rgba(26,24,21,.06);
    overflow: hidden;
    position: relative;
  }

  /* head */
  .pr-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    padding: 12px 18px;
    border-bottom: 1px solid var(--hairline);
    font-family: var(--mono);
    font-size: 0.7rem;
    letter-spacing: 0.06em;
    color: var(--muted);
  }
  .pr-head .live {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    color: var(--signal);
  }
  .pr-head .live .bead {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--signal);
    animation: breathe 2.4s ease-in-out infinite;
  }
  @keyframes breathe { 0%,100% { opacity: 1; } 50% { opacity: .35; } }

  /* body holds the SVG pipeline + the detail rail */
  .pr-body { padding: 20px 18px 8px; }

  /* tiny eyebrow above the diagram */
  .pr-eyebrow {
    font-family: var(--mono);
    font-size: 0.62rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--faint);
    margin: 0 0 14px;
    display: flex;
    justify-content: space-between;
  }
  .pr-eyebrow .arc { color: var(--muted); }

  /* the stage SVG */
  svg.stage { width: 100%; height: auto; display: block; overflow: visible; }

  /* node hit-targets are <g> with class .node; they get focus for a11y */
  .node { cursor: pointer; outline: none; }
  .node-ring {
    fill: var(--card);
    stroke: var(--hairline);
    stroke-width: 1.4;
    transition: stroke .45s cubic-bezier(.34,1.56,.64,1);
  }
  .node-core {
    fill: var(--faint);
    transition: fill .4s ease, r .45s cubic-bezier(.34,1.56,.64,1);
  }
  .node-pulse {
    fill: none;
    stroke: var(--persimmon);
    stroke-width: 1.4;
    opacity: 0;
  }

  /* active state: persimmon */
  .node.active .node-ring { stroke: var(--persimmon); }
  .node.active .node-core { fill: var(--persimmon); }
  .node.active .node-pulse { animation: ping 1.6s cubic-bezier(0,.6,.4,1) infinite; }
  @keyframes ping {
    0%   { opacity: .55; transform: scale(1); }
    70%  { opacity: 0;   transform: scale(2.6); }
    100% { opacity: 0;   transform: scale(2.6); }
  }

  /* visited / passed state: signal-green core, hairline ring */
  .node.passed .node-core { fill: var(--signal); }
  .node.passed .node-ring { stroke: rgba(27,127,92,.45); }

  /* the final ship node gets a soft persimmon halo when reached */
  .node.shipped .node-core { fill: var(--persimmon); }
  .node.shipped .node-ring { stroke: var(--persimmon); }

  /* connector base + animated overlay */
  .link-base { stroke: var(--hairline); stroke-width: 2; fill: none; }
  .link-flow {
    stroke: var(--signal);
    stroke-width: 2;
    fill: none;
    stroke-linecap: round;
    stroke-dasharray: 7 320;
    stroke-dashoffset: 327;
    opacity: 0;
  }
  .link-flow.run {
    opacity: 1;
    animation: dashRun 1s cubic-bezier(.45,.05,.35,1) forwards;
  }
  @keyframes dashRun {
    from { stroke-dashoffset: 327; opacity: 1; }
    to   { stroke-dashoffset: 0;   opacity: 1; }
  }
  /* the link stays "filled" persimmon-faint once traversed */
  .link-base.lit { stroke: rgba(27,127,92,.4); }

  /* stage labels under each node */
  .node-label {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.04em;
    fill: var(--muted);
    text-anchor: middle;
    transition: fill .4s ease;
    text-transform: uppercase;
  }
  .node.active .node-label { fill: var(--ink); }
  .node-index {
    font-family: var(--mono);
    font-size: 8px;
    fill: var(--faint);
    text-anchor: middle;
  }

  /* ---------- detail rail ---------- */
  .rail {
    margin-top: 6px;
    padding: 16px 18px 18px;
    border-top: 1px solid var(--hairline);
    min-height: 118px;
    position: relative;
  }
  .rail-kicker {
    font-family: var(--mono);
    font-size: 0.62rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--persimmon);
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 9px;
  }
  .rail-kicker .step {
    color: var(--faint);
    letter-spacing: 0.08em;
  }
  .rail-title {
    font-size: 1.02rem;
    font-weight: 600;
    letter-spacing: -0.01em;
    margin: 0 0 7px;
    line-height: 1.2;
  }
  .rail-desc {
    font-size: 0.84rem;
    line-height: 1.5;
    color: var(--muted);
    margin: 0 0 12px;
    max-width: 42ch;
  }
  /* the artifact chip — a tiny synthetic result that proves the stage */
  .rail-artifact {
    display: inline-flex;
    align-items: center;
    gap: 9px;
    font-family: var(--mono);
    font-size: 0.68rem;
    color: var(--muted);
    background: var(--paper);
    border: 1px solid var(--hairline);
    border-radius: 999px;
    padding: 5px 12px;
  }
  .rail-artifact .tick {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--signal);
  }
  .rail-artifact .tick.warm { background: var(--persimmon); }
  .rail-artifact b { color: var(--ink); font-weight: 500; }

  /* the rail content animates in with a spring, not a fade */
  .rail-content {
    opacity: 0;
    transform: translateY(7px);
  }
  .rail-content.show {
    animation: railIn .5s cubic-bezier(.34,1.56,.64,1) forwards;
  }
  @keyframes railIn {
    to { opacity: 1; transform: translateY(0); }
  }

  /* ---------- foot ---------- */
  .pr-foot {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
    padding: 11px 18px;
    border-top: 1px solid var(--hairline);
    font-family: var(--mono);
    font-size: 0.64rem;
    color: var(--faint);
    line-height: 1.5;
  }
  .pr-foot .ctrl {
    border: 1px solid var(--hairline);
    background: transparent;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 0.62rem;
    letter-spacing: 0.04em;
    padding: 4px 11px;
    border-radius: 999px;
    cursor: pointer;
    transition: border-color .15s, color .15s;
    white-space: nowrap;
  }
  .pr-foot .ctrl:hover { border-color: var(--persimmon); color: var(--ink); }
  .pr-foot .ctrl:focus-visible { outline: 2px solid var(--persimmon); outline-offset: 2px; }

  /* the progress meter: a thin loop indicator that fills as the cycle runs */
  .loop-meter {
    flex: 1;
    height: 2px;
    background: var(--hairline);
    border-radius: 2px;
    overflow: hidden;
    margin: 0 4px;
    position: relative;
  }
  .loop-meter i {
    position: absolute;
    inset: 0 100% 0 0;
    background: linear-gradient(90deg, var(--signal), var(--persimmon));
    border-radius: 2px;
    transition: inset .4s cubic-bezier(.45,.05,.35,1);
  }

  .node:focus-visible .node-ring { stroke: var(--persimmon); stroke-width: 2; }

  /* ---------- reduced motion: the complete artifact ---------- */
  @media (prefers-reduced-motion: reduce) {
    .node.active .node-pulse { animation: none; opacity: 0; }
    .link-flow { animation: none !important; opacity: 0; }
    .rail-content { opacity: 1 !important; transform: none !important; animation: none !important; }
    .pr-head .live .bead { animation: none; }
    .loop-meter i { transition: none; }
  }
</style>
</head>
<body>

<figure class="practice" aria-label="Simone's practice, as a pipeline: design behavior, build, golden datasets, evaluation, ship">
  <div class="pr-head">
    <span>practice · end-to-end</span>
    <span class="live"><span class="bead" aria-hidden="true"></span>RUNNING</span>
  </div>

  <div class="pr-body">
    <p class="pr-eyebrow">
      <span>The arc I own</span>
      <span class="arc">behavior &rarr; shipped</span>
    </p>

    <!-- five-stage pipeline. viewBox tuned so it sits ~410px wide in the card. -->
    <svg class="stage" viewBox="0 0 410 116" role="img" aria-hidden="true">
      <defs>
        <!-- soft glow used under the active core -->
        <filter id="soft" x="-60%" y="-60%" width="220%" height="220%">
          <feGaussianBlur stdDeviation="2.2" />
        </filter>
      </defs>

      <!-- connector base lines (drawn first, behind nodes) -->
      <g id="links-base">
        <line class="link-base" data-seg="0" x1="41"  y1="46" x2="133" y2="46" />
        <line class="link-base" data-seg="1" x1="133" y1="46" x2="225" y2="46" />
        <line class="link-base" data-seg="2" x1="225" y1="46" x2="317" y2="46" />
        <line class="link-base" data-seg="3" x1="317" y1="46" x2="369" y2="46" />
      </g>
      <!-- animated flow overlays (same geometry) -->
      <g id="links-flow">
        <line class="link-flow" data-flow="0" x1="41"  y1="46" x2="133" y2="46" pathLength="100" />
        <line class="link-flow" data-flow="1" x1="133" y1="46" x2="225" y2="46" pathLength="100" />
        <line class="link-flow" data-flow="2" x1="225" y1="46" x2="317" y2="46" pathLength="100" />
        <line class="link-flow" data-flow="3" x1="317" y1="46" x2="369" y2="46" pathLength="100" />
      </g>

      <!-- nodes -->
      <!-- 0 Design behavior -->
      <g class="node" data-stage="0" transform="translate(41,46)" tabindex="0" role="button" aria-label="Stage 1: Design behavior">
        <circle class="node-pulse" r="11" />
        <circle class="node-ring" r="11" />
        <circle class="node-core" r="4.5" filter="url(#soft)" />
        <text class="node-index" y="-19">01</text>
        <text class="node-label" y="32">DESIGN</text>
      </g>
      <!-- 1 Build -->
      <g class="node" data-stage="1" transform="translate(133,46)" tabindex="0" role="button" aria-label="Stage 2: Build">
        <circle class="node-pulse" r="11" />
        <circle class="node-ring" r="11" />
        <circle class="node-core" r="4.5" filter="url(#soft)" />
        <text class="node-index" y="-19">02</text>
        <text class="node-label" y="32">BUILD</text>
      </g>
      <!-- 2 Golden datasets -->
      <g class="node" data-stage="2" transform="translate(225,46)" tabindex="0" role="button" aria-label="Stage 3: Golden datasets">
        <circle class="node-pulse" r="11" />
        <circle class="node-ring" r="11" />
        <circle class="node-core" r="4.5" filter="url(#soft)" />
        <text class="node-index" y="-19">03</text>
        <text class="node-label" y="32">DATASETS</text>
      </g>
      <!-- 3 Evaluation -->
      <g class="node" data-stage="3" transform="translate(317,46)" tabindex="0" role="button" aria-label="Stage 4: Evaluation">
        <circle class="node-pulse" r="11" />
        <circle class="node-ring" r="11" />
        <circle class="node-core" r="4.5" filter="url(#soft)" />
        <text class="node-index" y="-19">04</text>
        <text class="node-label" y="32">EVALUATE</text>
      </g>
      <!-- 4 Ship (terminal) -->
      <g class="node" data-stage="4" transform="translate(369,46)" tabindex="0" role="button" aria-label="Stage 5: Ship">
        <circle class="node-pulse" r="11" />
        <circle class="node-ring" r="11" />
        <circle class="node-core" r="4.5" filter="url(#soft)" />
        <text class="node-index" y="-19">05</text>
        <text class="node-label" y="32">SHIP</text>
      </g>
    </svg>
  </div>

  <!-- detail rail: reveals the active stage's micro-detail -->
  <div class="rail" aria-live="polite">
    <div class="rail-content" id="railContent">
      <!-- populated by JS -->
    </div>
  </div>

  <div class="pr-foot">
    <button class="ctrl" id="playBtn" type="button" aria-label="Pause or resume the loop">PAUSE</button>
    <span class="loop-meter" aria-hidden="true"><i id="meterFill"></i></span>
    <span id="footHint">hover a stage</span>
  </div>
</figure>

<script>
(() => {
  const REDUCED = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  // ---- the practice, in five stages. Invented, sanitized, identity-level. ----
  const STAGES = [
    {
      kicker: 'Design behavior',
      title: 'Decide what good sounds like',
      desc: 'I write the behavior before a line of it exists: what the agent should do, refuse, and hand off, and the voice it does it in.',
      artifact: '12 behaviors specified · 4 refusal rules',
      warm: true,
    },
    {
      kicker: 'Build',
      title: 'Prompts, skills, and the tools behind them',
      desc: 'I build the working thing, not a doc about it: the system prompt, the skill, and the tool calls that fetch real answers.',
      artifact: 'skill + 3 tools wired · returns live',
      warm: true,
    },
    {
      kicker: 'Golden datasets',
      title: 'Curate the cases that define correct',
      desc: 'A labeled set of hard, real-shaped cases, the edges and the traps, so quality has a fixed target instead of a vibe.',
      artifact: '108 cases · edges + adversarial held out',
      warm: false,
    },
    {
      kicker: 'Evaluation',
      title: 'Prove it against the set, every change',
      desc: 'Validated judges score each version on the golden set. Quality becomes a gate, not an opinion: it passes or it does not ship.',
      artifact: '96.6% pass · gate green',
      warm: false,
    },
    {
      kicker: 'Ship',
      title: 'Release it, then watch it in the wild',
      desc: 'Into production behind the eval gate, with the signal wired up so the next loop starts from what real users actually did.',
      artifact: 'shipped · +3.9 pp measured',
      warm: true,
    },
  ];

  const svg = document.querySelector('svg.stage');
  const nodes = [...svg.querySelectorAll('.node')];
  const flows = [...svg.querySelectorAll('.link-flow')];
  const baseLinks = [...svg.querySelectorAll('.link-base')];
  const railContent = document.getElementById('railContent');
  const meterFill = document.getElementById('meterFill');
  const playBtn = document.getElementById('playBtn');
  const footHint = document.getElementById('footHint');

  let cycleTimer = null;
  let running = true;
  let hoverLock = false;       // true while user is hovering/focusing a node
  let current = -1;            // stage the autoplay last lit
  const STEP_MS = 1700;        // dwell per stage

  // ---- render the detail rail for a given stage ----
  function renderRail(i) {
    const s = STAGES[i];
    railContent.classList.remove('show');
    // force reflow so the spring re-fires
    void railContent.offsetWidth;
    railContent.innerHTML = `
      <div class="rail-kicker">
        <span>${s.kicker}</span>
        <span class="step">STAGE ${String(i + 1).padStart(2, '0')} / 05</span>
      </div>
      <h3 class="rail-title">${s.title}</h3>
      <p class="rail-desc">${s.desc}</p>
      <span class="rail-artifact">
        <span class="tick ${s.warm ? 'warm' : ''}"></span>
        <b>${s.artifact.split('·')[0].trim()}</b>${s.artifact.includes('·') ? ' · ' + s.artifact.split('·').slice(1).join('·').trim() : ''}
      </span>`;
    railContent.classList.add('show');
  }

  // ---- set node visual state for the active stage ----
  function lightStage(i, { fromAuto = false } = {}) {
    nodes.forEach((n, idx) => {
      n.classList.toggle('active', idx === i);
      // every stage before the active one is "passed"
      n.classList.toggle('passed', idx < i);
      // the ship node, once reached, gets its persimmon terminal state
      n.classList.toggle('shipped', idx === 4 && i >= 4);
    });
    // links: those before the active node are lit (traversed)
    baseLinks.forEach((l, idx) => l.classList.toggle('lit', idx < i));
    renderRail(i);
    // meter
    const pct = i / (STAGES.length - 1);
    meterFill.style.inset = `0 ${100 - pct * 100}% 0 0`;
    current = i;
  }

  // ---- fire the flow animation along the segment entering stage i ----
  function runFlow(seg) {
    if (REDUCED || seg < 0 || seg >= flows.length) return;
    const f = flows[seg];
    f.classList.remove('run');
    void f.getBBox(); // reflow
    f.classList.add('run');
  }

  // ---- the autoplay loop ----
  function advance() {
    if (!running || hoverLock) return;
    let next = current + 1;
    if (next >= STAGES.length) {
      next = 0; // loop back to the start of the practice
    }
    // animate the connector flowing INTO the next node (except on wrap to 0)
    if (next > 0) runFlow(next - 1);
    // light slightly after the flow begins so the pulse "arrives"
    const delay = (REDUCED || next === 0) ? 0 : 420;
    setTimeout(() => { if (running && !hoverLock) lightStage(next, { fromAuto: true }); }, delay);
  }

  function startLoop() {
    stopLoop();
    cycleTimer = setInterval(advance, STEP_MS);
  }
  function stopLoop() {
    if (cycleTimer) { clearInterval(cycleTimer); cycleTimer = null; }
  }

  // ---- pause / resume control ----
  playBtn.addEventListener('click', () => {
    running = !running;
    playBtn.textContent = running ? 'PAUSE' : 'PLAY';
    document.querySelector('.live').style.opacity = running ? '1' : '.4';
    if (running) { hoverLock = false; startLoop(); }
    else { stopLoop(); }
  });

  // ---- hover / focus: lock the loop on the inspected stage ----
  function inspect(i) {
    hoverLock = true;
    stopLoop();
    lightStage(i);
    footHint.textContent = STAGES[i].kicker.toLowerCase();
  }
  function release() {
    if (!running) return;
    hoverLock = false;
    footHint.textContent = 'hover a stage';
    startLoop();
  }

  nodes.forEach((n, i) => {
    n.addEventListener('mouseenter', () => inspect(i));
    n.addEventListener('mouseleave', release);
    n.addEventListener('focus', () => inspect(i));
    n.addEventListener('blur', release);
    // click pins it: stops the loop and keeps it pinned until clicked again
    n.addEventListener('click', () => {
      if (running) {
        running = false;
        playBtn.textContent = 'PLAY';
        document.querySelector('.live').style.opacity = '.4';
      }
      hoverLock = false;
      stopLoop();
      lightStage(i);
      footHint.textContent = 'pinned · press play';
    });
    n.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); n.click(); }
    });
  });

  // ---- boot ----
  function boot() {
    if (REDUCED) {
      // complete static artifact: whole pipeline traversed, ship reached, rail on final stage
      nodes.forEach((n, idx) => {
        n.classList.add('passed');
        if (idx === 4) { n.classList.add('shipped'); n.classList.remove('passed'); }
      });
      baseLinks.forEach(l => l.classList.add('lit'));
      lightStage(4);
      nodes.forEach(n => n.classList.remove('active'));
      meterFill.style.inset = '0 0 0 0';
      playBtn.textContent = 'PLAY';
      document.querySelector('.live').textContent = '';
      const live = document.querySelector('.live');
      live.insertAdjacentText('beforeend', 'READY');
      running = false;
      footHint.textContent = 'hover a stage';
      return;
    }
    lightStage(0);
    runFlow(-1);
    startLoop();
  }

  // small delay so fonts settle before the first reveal (avoids CLS jump)
  if (document.readyState === 'complete') boot();
  else window.addEventListener('load', boot);
})();
</script>
</body>
</html>
