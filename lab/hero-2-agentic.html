<!doctype html>
<html lang="en">
<head>
<meta name="robots" content="noindex">
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>The Agentic Window · Simone Muro</title>
<meta name="description" content="One agentic exchange, end to end: reasoning that tucks away, tool calls that resolve, an answer that renders a structured widget inline. The caliber of experience Simone designs." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500&family=Newsreader:ital,opsz,wght@1,6..72,400;1,6..72,500&display=swap" rel="stylesheet" />
<style>
  :root {
    --paper: #faf9f6;
    --card: #ffffff;
    --ink: #1a1815;
    --muted: #6b6660;
    --faint: #9b958c;
    --hairline: #e5e1da;
    --persimmon: #e8552f;
    --signal: #1b7f5c;
    --sans: "Geist", system-ui, -apple-system, sans-serif;
    --mono: "Geist Mono", ui-monospace, SFMono-Regular, monospace;
    --serif: "Newsreader", Georgia, serif;
    /* physical easing family — one curve, used proportionally everywhere */
    --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
    --settle: cubic-bezier(0.22, 1, 0.36, 1);
  }
  @property --sweep { syntax: "<percentage>"; inherits: false; initial-value: 0%; }

  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    background: var(--paper);
    color: var(--ink);
    font-family: var(--sans);
    font-size: 1rem;
    line-height: 1.65;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 56px 24px;
  }
  ::selection { background: var(--persimmon); color: var(--paper); }

  /* ---- stage: caption + card, sized for the hero's right column ---- */
  .stage { width: 100%; max-width: 460px; }

  .caption {
    font-family: var(--mono);
    font-size: 0.7rem;
    letter-spacing: 0.04em;
    color: var(--muted);
    line-height: 1.6;
    margin: 0 4px 16px;
  }
  .caption b { color: var(--ink); font-weight: 500; }

  /* ---- the card frame (matches .inst in v3.css) ---- */
  .inst {
    border: 1px solid var(--hairline);
    border-radius: 16px;
    background: var(--card);
    box-shadow: 0 1px 2px rgba(26,24,21,0.04), 0 12px 40px rgba(26,24,21,0.06);
    overflow: hidden;
  }
  .inst-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    padding: 12px 18px;
    border-bottom: 1px solid var(--hairline);
    font-family: var(--mono);
    font-size: 0.7rem;
    letter-spacing: 0.06em;
    color: var(--muted);
  }
  .inst-head .live {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    color: var(--signal);
  }
  .inst-head .live i {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--signal);
    animation: breathe 2.4s infinite;
  }
  @keyframes breathe { 0%,100% { opacity: 1; } 50% { opacity: 0.32; } }

  .thread {
    padding: 18px 18px 8px;
    min-height: 396px;
    display: flex;
    flex-direction: column;
  }

  /* ---- generic appear ---- */
  .appear {
    opacity: 0;
    transform: translateY(7px);
  }
  .appear.in {
    opacity: 1;
    transform: none;
    transition: opacity 0.5s var(--settle), transform 0.55s var(--spring);
  }

  /* ---- user message ---- */
  .user {
    align-self: flex-end;
    max-width: 84%;
    background: var(--ink);
    color: var(--paper);
    padding: 9px 15px;
    border-radius: 15px 15px 4px 15px;
    font-size: 0.88rem;
    line-height: 1.5;
    margin-bottom: 16px;
  }

  /* ---- reasoning trace ---- */
  .reason {
    margin-bottom: 14px;
    border: 1px solid var(--hairline);
    border-radius: 12px;
    background: var(--paper);
    overflow: hidden;
  }
  .reason-head {
    display: flex;
    align-items: center;
    gap: 9px;
    width: 100%;
    padding: 10px 13px;
    border: 0;
    background: transparent;
    cursor: pointer;
    font-family: var(--mono);
    font-size: 0.71rem;
    letter-spacing: 0.02em;
    color: var(--muted);
    text-align: left;
  }
  .reason-head .glyph {
    position: relative;
    width: 13px; height: 13px;
    flex: none;
  }
  .reason-head .glyph i {
    position: absolute;
    inset: 0;
    border: 1.5px solid var(--faint);
    border-radius: 50%;
    border-top-color: var(--persimmon);
  }
  .reason.thinking .glyph i { animation: spin 0.9s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .reason.done .glyph i {
    border-color: var(--signal);
    border-top-color: var(--signal);
    animation: none;
  }
  .reason-head .label { flex: 1; }
  .reason-head .chev {
    width: 9px; height: 9px;
    border-right: 1.5px solid var(--faint);
    border-bottom: 1.5px solid var(--faint);
    transform: rotate(45deg);
    transition: transform 0.4s var(--settle);
    margin-right: 2px;
  }
  .reason.collapsed .reason-head .chev { transform: rotate(-45deg); }
  .reason.thinking .reason-head .chev { opacity: 0; }

  .reason-body {
    display: grid;
    grid-template-rows: 1fr;
    transition: grid-template-rows 0.5s var(--settle);
  }
  .reason.collapsed .reason-body { grid-template-rows: 0fr; }
  .reason-body > div {
    overflow: hidden;
    min-height: 0;
  }
  .reason-steps {
    padding: 2px 14px 13px 34px;
    font-size: 0.79rem;
    line-height: 1.55;
    color: var(--faint);
  }
  .reason-steps p {
    margin: 0 0 7px;
    opacity: 0;
    transform: translateX(-4px);
  }
  .reason-steps p.in {
    opacity: 1;
    transform: none;
    transition: opacity 0.45s var(--settle), transform 0.45s var(--settle);
  }
  .reason-steps p:last-child { margin-bottom: 0; }

  /* ---- tool-call chip ---- */
  .tool {
    margin-bottom: 14px;
    border: 1px solid var(--hairline);
    border-radius: 12px;
    background: var(--card);
    overflow: hidden;
  }
  .tool-head {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 13px;
    font-family: var(--mono);
    font-size: 0.71rem;
    color: var(--muted);
  }
  .tool-head .ic {
    width: 22px; height: 22px;
    flex: none;
    display: grid;
    place-items: center;
    border-radius: 7px;
    background: var(--paper);
    border: 1px solid var(--hairline);
    color: var(--muted);
  }
  .tool-head .ic svg { width: 13px; height: 13px; display: block; }
  .tool-head > span:nth-child(2) {
    min-width: 0;
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
  }
  .tool-head .verb { color: var(--ink); }
  .tool-head .arg { color: var(--faint); }
  .tool-head .pill {
    flex: none;
    margin-left: auto;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 0.64rem;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .tool-head .pill .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--signal);
    animation: pulse 1.3s var(--settle) infinite;
  }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(27,127,92,0.34); }
    70% { box-shadow: 0 0 0 6px rgba(27,127,92,0); }
    100% { box-shadow: 0 0 0 0 rgba(27,127,92,0); }
  }
  .tool.done .ic { color: var(--signal); border-color: rgba(27,127,92,0.4); background: rgba(27,127,92,0.06); }
  .tool.done .pill .dot { animation: none; background: var(--signal); }
  .tool.done .pill { color: var(--signal); }

  /* tool result — collapses open while running, tucks to one line when done */
  .tool-body {
    display: grid;
    grid-template-rows: 0fr;
    transition: grid-template-rows 0.5s var(--settle);
  }
  .tool.open .tool-body { grid-template-rows: 1fr; }
  .tool-body > div { overflow: hidden; min-height: 0; }
  .tool-rows {
    padding: 0 13px 11px 45px;
    font-family: var(--mono);
    font-size: 0.7rem;
    line-height: 1.5;
    color: var(--muted);
  }
  .tool-rows .r {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    padding: 3px 0;
    border-top: 1px solid var(--hairline);
    opacity: 0;
    transform: translateY(3px);
  }
  .tool-rows .r.in {
    opacity: 1; transform: none;
    transition: opacity 0.4s var(--settle), transform 0.4s var(--settle);
  }
  .tool-rows .r:first-child { border-top: 0; }
  .tool-rows .r .v { color: var(--ink); }
  .tool-rows .skel {
    height: 9px; border-radius: 4px;
    background: linear-gradient(90deg, var(--hairline) 25%, #efece5 50%, var(--hairline) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.1s linear infinite;
    margin: 6px 0;
  }
  .tool-rows .skel.w1 { width: 70%; } .tool-rows .skel.w2 { width: 52%; }
  @keyframes shimmer { to { background-position: -200% 0; } }

  /* ---- answer ---- */
  .answer {
    font-size: 0.9rem;
    line-height: 1.6;
    color: var(--ink);
    margin-bottom: 14px;
  }
  .answer .caret {
    display: inline-block;
    width: 2px; height: 1.02em;
    vertical-align: -0.18em;
    background: var(--persimmon);
    margin-left: 1px;
    animation: caret 1s steps(1) infinite;
  }
  @keyframes caret { 50% { opacity: 0; } }

  /* ---- inline structured widget: a small rendered "result" ---- */
  .widget {
    margin: 12px 0 2px;
    border: 1px solid var(--hairline);
    border-radius: 12px;
    background: var(--paper);
    overflow: hidden;
    opacity: 0;
    transform: translateY(8px) scale(0.985);
  }
  .widget.in {
    opacity: 1; transform: none;
    transition: opacity 0.55s var(--settle), transform 0.6s var(--spring);
  }
  .widget-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 10px;
    padding: 11px 14px 9px;
  }
  .widget-head .title { font-size: 0.84rem; font-weight: 500; letter-spacing: -0.01em; }
  .widget-head .meta { font-family: var(--mono); font-size: 0.62rem; letter-spacing: 0.05em; color: var(--faint); text-transform: uppercase; }

  .bars { padding: 2px 14px 12px; display: grid; gap: 9px; }
  .bar { display: grid; grid-template-columns: 96px 1fr 52px; align-items: center; gap: 10px; }
  .bar .name { font-size: 0.76rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .bar .track { height: 7px; border-radius: 4px; background: var(--hairline); overflow: hidden; }
  .bar .fill {
    height: 100%;
    border-radius: 4px;
    background: var(--faint);
    width: 0%;
    transition: width 0.9s var(--settle);
  }
  .bar.lead .fill { background: var(--persimmon); }
  .bar .pct { font-family: var(--mono); font-size: 0.72rem; color: var(--ink); text-align: right; }
  .widget-foot {
    border-top: 1px solid var(--hairline);
    padding: 8px 14px;
    font-family: var(--mono);
    font-size: 0.62rem;
    color: var(--faint);
    display: flex;
    align-items: center;
    gap: 7px;
  }
  .widget-foot svg { width: 11px; height: 11px; flex: none; }

  .followups { display: flex; flex-wrap: wrap; gap: 7px; margin: 6px 0 4px; }
  .fu {
    font-family: var(--mono);
    font-size: 0.69rem;
    border: 1px solid var(--hairline);
    background: transparent;
    border-radius: 999px;
    padding: 6px 12px;
    color: var(--muted);
    cursor: pointer;
    opacity: 0;
    transform: translateY(5px);
    transition: opacity 0.4s var(--settle), transform 0.45s var(--spring), border-color 0.15s, color 0.15s;
  }
  .fu.in { opacity: 1; transform: none; }
  .fu:hover { border-color: var(--persimmon); color: var(--ink); }

  /* ---- composer (docked, with reachable stop) ---- */
  .composer {
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 11px 14px;
    border-top: 1px solid var(--hairline);
  }
  .composer .fake {
    flex: 1;
    height: 34px;
    border-radius: 999px;
    border: 1px solid var(--hairline);
    background: var(--paper);
    display: flex;
    align-items: center;
    padding: 0 15px;
    font-size: 0.82rem;
    color: var(--faint);
  }
  .composer .act {
    width: 34px; height: 34px;
    border-radius: 50%;
    border: 0;
    background: var(--ink);
    color: var(--paper);
    cursor: pointer;
    display: grid;
    place-items: center;
    flex: none;
    transition: background 0.2s, transform 0.2s var(--spring);
  }
  .composer .act svg { width: 14px; height: 14px; }
  .composer .act.stop { background: var(--persimmon); }
  .composer .act.stop svg { width: 11px; height: 11px; }
  .composer .act:hover { transform: scale(1.06); }

  /* replay control */
  .replay {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: var(--mono);
    font-size: 0.66rem;
    letter-spacing: 0.04em;
    color: var(--muted);
    background: transparent;
    border: 0;
    cursor: pointer;
    padding: 0;
  }
  .replay svg { width: 11px; height: 11px; }
  .replay:hover { color: var(--persimmon); }

  /* ---- reduced motion: the finished artifact, fully legible, no motion ---- */
  @media (prefers-reduced-motion: reduce) {
    .appear, .user, .reason, .tool, .answer, .widget, .fu, .reason-steps p, .tool-rows .r {
      opacity: 1 !important;
      transform: none !important;
      transition: none !important;
    }
    .reason.collapsed .reason-body { grid-template-rows: 1fr; }
    .tool-body { grid-template-rows: 1fr; }
    .bar .fill { transition: none; }
    .inst-head .live i, .reason .glyph i, .tool .pill .dot, .answer .caret, .tool-rows .skel { animation: none; }
  }
</style>
</head>
<body>
  <main class="stage">
    <p class="caption"><b>The caliber Simone designs for.</b> One agentic exchange, played start to finish: reasoning that shows its work then tucks away, tool calls that resolve, an answer that renders a result inline. Sanitized demo, invented data.</p>

    <section class="inst" aria-label="A live agentic exchange, demonstrated">
      <div class="inst-head">
        <span>agentic exchange</span>
        <span class="live"><i></i>autoplay</span>
      </div>

      <div class="thread" id="thread" role="log" aria-live="polite"></div>

      <div class="composer">
        <span class="fake" id="ghost">Ask anything…</span>
        <button class="act" id="actbtn" type="button" aria-label="Replay the exchange">
          <svg id="acticon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12a7 7 0 1 1 2 4.9"/><path d="M5 12V8m0 4h4"/></svg>
        </button>
      </div>
    </section>
  </main>

<script>
(() => {
  const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const thread = document.getElementById('thread');
  const ghost = document.getElementById('ghost');
  const actbtn = document.getElementById('actbtn');
  const acticon = document.getElementById('acticon');
  let timers = [];
  let running = false;

  const wait = (ms) => new Promise(r => { const t = setTimeout(r, reduce ? 0 : ms); timers.push(t); });
  const clearAll = () => { timers.forEach(clearTimeout); timers = []; };

  const SEARCH_ICO = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>';
  const CALC_ICO   = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="3" width="14" height="18" rx="2"/><path d="M9 7h6M9 11h.01M12 11h.01M15 11h.01M9 15h.01M12 15h.01M15 15h.01"/></svg>';
  const SHIELD_ICO = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l7 3v5c0 4.4-3 7.6-7 9-4-1.4-7-4.6-7-9V6z"/><path d="m9 12 2 2 4-4"/></svg>';

  const el = (tag, cls, html) => {
    const n = document.createElement(tag);
    if (cls) n.className = cls;
    if (html != null) n.innerHTML = html;
    return n;
  };

  // stream text token-ish into a node, leaving a caret at the tip
  function streamInto(node, text, speed = 16) {
    return new Promise((resolve) => {
      const caret = el('span', 'caret');
      node.appendChild(caret);
      if (reduce) { node.insertBefore(document.createTextNode(text), caret); caret.remove(); return resolve(); }
      const words = text.split(/(\s+)/);
      let i = 0;
      const step = () => {
        if (i >= words.length) { caret.remove(); return resolve(); }
        node.insertBefore(document.createTextNode(words[i]), caret);
        i++;
        const t = setTimeout(step, speed + Math.random() * speed);
        timers.push(t);
      };
      step();
    });
  }

  async function run() {
    if (running) return;
    running = true;
    thread.innerHTML = '';
    setActState('stop');

    // 1 — user asks something open-ended (invented, non-confidential domain)
    const user = el('div', 'user appear', 'We onboarded 40 new field reps last quarter. Which of our help articles are letting them down, and what would you fix first?');
    thread.appendChild(user);
    await wait(60); user.classList.add('in');
    await wait(900);

    // 2 — reasoning trace: spins up, streams dimmed steps, then collapses to a summary
    const reason = el('div', 'reason thinking appear');
    reason.innerHTML = `
      <button class="reason-head" type="button" aria-expanded="true">
        <span class="glyph"><i></i></span>
        <span class="label">Reasoning</span>
        <span class="chev" aria-hidden="true"></span>
      </button>
      <div class="reason-body"><div><div class="reason-steps"></div></div></div>`;
    thread.appendChild(reason);
    await wait(40); reason.classList.add('in');

    const steps = reason.querySelector('.reason-steps');
    const rhead = reason.querySelector('.reason-head');
    const rlabel = reason.querySelector('.label');
    const STEPS = [
      'New reps fail on tasks veterans never reread, so recency-weighted views will mislead. Anchor on the cohort.',
      'Pull article performance for the 40-rep onboarding segment, last 90 days.',
      'A high exit rate alone is ambiguous. Cross it with completion to separate "confusing" from "just long."',
    ];
    rhead.addEventListener('click', () => toggleReason(reason));

    for (let i = 0; i < STEPS.length; i++) {
      const p = el('p', null, '');
      steps.appendChild(p);
      await wait(30); p.classList.add('in');
      await streamInto(p, STEPS[i], 11);
      await wait(reduce ? 0 : 360);
    }
    await wait(reduce ? 0 : 520);

    // collapse the trace to a one-line summary chip the user can reopen
    rlabel.textContent = 'Thought for 6s';
    reason.classList.remove('thinking');
    reason.classList.add('done');
    if (!reduce) reason.classList.add('collapsed');
    rhead.setAttribute('aria-expanded', reduce ? 'true' : 'false');
    await wait(reduce ? 0 : 480);

    // 3 — tool call: search the knowledge base (pending -> resolved with structured rows)
    const t1 = el('div', 'tool open appear');
    t1.innerHTML = `
      <div class="tool-head">
        <span class="ic">${SEARCH_ICO}</span>
        <span><span class="verb">Searching</span> <span class="arg">help_center · onboarding cohort · 90d</span></span>
        <span class="pill"><span class="dot"></span><span class="lbl">Running</span></span>
      </div>
      <div class="tool-body"><div><div class="tool-rows">
        <div class="skel w1"></div><div class="skel w2"></div>
      </div></div></div>`;
    thread.appendChild(t1);
    await wait(40); t1.classList.add('in');
    await wait(reduce ? 0 : 1150);

    // resolve t1: swap skeleton for retrieved rows, then auto-tuck to a one-line summary
    const rows1 = t1.querySelector('.tool-rows');
    rows1.innerHTML = '';
    const DATA = [
      { name: 'Logging your first visit', exit: 61, done: 38, lead: true },
      { name: 'Syncing the route planner', exit: 47, done: 55 },
      { name: 'Submitting expenses offline', exit: 44, done: 71 },
    ];
    const summaryRows = [
      ['articles scanned', '128'],
      ['flagged for review', '3'],
      ['highest exit rate', '61% · "Logging your first visit"'],
    ];
    for (const [k, v] of summaryRows) {
      const r = el('div', 'r', `<span class="k">${k}</span><span class="v">${v}</span>`);
      rows1.appendChild(r);
      await wait(30); r.classList.add('in');
      await wait(reduce ? 0 : 110);
    }
    t1.querySelector('.verb').textContent = 'Searched';
    t1.querySelector('.lbl').textContent = '3 flagged';
    t1.classList.add('done');
    await wait(reduce ? 0 : 700);
    if (!reduce) t1.classList.remove('open'); // tuck closed; user could reopen in a real build
    await wait(reduce ? 0 : 460);

    // 4 — second tool call: a guardrail / safety check (shows agentic provenance discipline)
    const t2 = el('div', 'tool open appear');
    t2.innerHTML = `
      <div class="tool-head">
        <span class="ic">${SHIELD_ICO}</span>
        <span><span class="verb">Checking</span> <span class="arg">data freshness + access scope</span></span>
        <span class="pill"><span class="dot"></span><span class="lbl">Running</span></span>
      </div>
      <div class="tool-body"><div><div class="tool-rows">
        <div class="skel w1"></div>
      </div></div></div>`;
    thread.appendChild(t2);
    await wait(40); t2.classList.add('in');
    await wait(reduce ? 0 : 820);
    const rows2 = t2.querySelector('.tool-rows');
    rows2.innerHTML = '';
    for (const [k, v] of [['source', 'help_center analytics'], ['freshness', 'synced 14m ago'], ['scope', 'read-only · aggregate']]) {
      const r = el('div', 'r', `<span class="k">${k}</span><span class="v">${v}</span>`);
      rows2.appendChild(r);
      await wait(30); r.classList.add('in');
      await wait(reduce ? 0 : 90);
    }
    t2.querySelector('.verb').textContent = 'Checked';
    t2.querySelector('.lbl').textContent = 'Passed';
    t2.classList.add('done');
    await wait(reduce ? 0 : 620);
    if (!reduce) t2.classList.remove('open');
    await wait(reduce ? 0 : 440);

    // 5 — confident answer, streamed, with an inline structured widget mid-message
    const ans = el('div', 'answer appear');
    thread.appendChild(ans);
    await wait(40); ans.classList.add('in');

    const pre = el('span', null, '');
    ans.appendChild(pre);
    await streamInto(pre, 'Three articles are stalling new reps. The first one is the real problem: most leave before finishing, so it reads as confusing, not just long.', 15);

    // inline rendered widget (the "result that is UI, not text")
    const widget = el('div', 'widget');
    widget.innerHTML = `
      <div class="widget-head">
        <span class="title">Onboarding articles · exit rate</span>
        <span class="meta">40-rep cohort · 90d</span>
      </div>
      <div class="bars"></div>
      <div class="widget-foot">${SHIELD_ICO}<span>synthetic data · read-only · synced 14m ago</span></div>`;
    ans.appendChild(widget);
    await wait(40); widget.classList.add('in');

    const barsWrap = widget.querySelector('.bars');
    DATA.forEach((d) => {
      const bar = el('div', 'bar' + (d.lead ? ' lead' : ''));
      bar.innerHTML = `
        <span class="name">${d.name}</span>
        <span class="track"><span class="fill"></span></span>
        <span class="pct">${d.exit}%</span>`;
      barsWrap.appendChild(bar);
    });
    await wait(reduce ? 0 : 80);
    // animate the bars filling on a stagger (compositor-friendly width transition)
    barsWrap.querySelectorAll('.bar').forEach((bar, i) => {
      const t = setTimeout(() => { bar.querySelector('.fill').style.width = DATA[i].exit + '%'; }, reduce ? 0 : i * 110);
      timers.push(t);
    });
    await wait(reduce ? 0 : 760);

    // continue the answer after the widget — recommendation + impact preview
    const post = el('span', null, '');
    ans.appendChild(post);
    await streamInto(post, ' Fix first: split "Logging your first visit" into a 3-step quickstart and move the troubleshooting below the fold. Estimated impact: exit rate 61% to about 40%, roughly 9 fewer support tickets a week.', 15);

    // 6 — follow-up suggestions appear, settling in
    const fus = el('div', 'followups');
    const FU = ['Draft the rewrite', 'Why is exit rate misleading alone?', 'Show the other two'];
    FU.forEach((f) => fus.appendChild(el('button', 'fu', f)));
    thread.appendChild(fus);
    await wait(reduce ? 0 : 120);
    [...fus.children].forEach((b, i) => {
      const t = setTimeout(() => b.classList.add('in'), reduce ? 0 : i * 90);
      timers.push(t);
    });

    await wait(reduce ? 0 : 500);
    setActState('replay');
    running = false;
  }

  function toggleReason(reason) {
    const open = reason.classList.toggle('collapsed');
    reason.querySelector('.reason-head').setAttribute('aria-expanded', open ? 'false' : 'true');
  }

  function setActState(mode) {
    if (mode === 'stop') {
      acticon.innerHTML = '<rect x="6" y="6" width="12" height="12" rx="2.2" fill="currentColor" stroke="none"/>';
      actbtn.classList.add('stop');
      actbtn.setAttribute('aria-label', 'Stop generating');
      ghost.textContent = 'Generating…';
    } else {
      acticon.innerHTML = '<path d="M5 12a7 7 0 1 1 2 4.9"/><path d="M5 12V8m0 4h4"/>';
      actbtn.classList.remove('stop');
      actbtn.setAttribute('aria-label', 'Replay the exchange');
      ghost.textContent = 'Ask anything…';
    }
  }

  actbtn.addEventListener('click', () => {
    if (running) {
      clearAll();
      running = false;
      setActState('replay');
    } else {
      clearAll();
      run();
    }
  });

  // autoplay on load
  run();
})();
</script>
</body>
</html>
