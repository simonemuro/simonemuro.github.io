<!doctype html>
<html lang="en">
<head>
<meta name="robots" content="noindex">
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>The Agentic Window · Simone Muro</title>
<meta name="description" content="One empathetic support exchange, end to end: reasoning that tucks away, tool calls that resolve, an answer that renders a charge breakdown inline. The kind of agentic support experience Simone designs." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500&family=Newsreader:ital,opsz,wght@1,6..72,400;1,6..72,500&display=swap" rel="stylesheet" />
<style>
  :root {
    --paper: #faf9f6;
    --card: #ffffff;
    --ink: #1a1815;
    --muted: #6b6660;
    --faint: #9b958c;
    --hairline: #e5e1da;
    --persimmon: #e8552f;
    --signal: #1b7f5c;
    --sans: "Geist", system-ui, -apple-system, sans-serif;
    --mono: "Geist Mono", ui-monospace, SFMono-Regular, monospace;
    --serif: "Newsreader", Georgia, serif;
    /* physical easing family — one curve, used proportionally everywhere */
    --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
    --settle: cubic-bezier(0.22, 1, 0.36, 1);
  }
  @property --sweep { syntax: "<percentage>"; inherits: false; initial-value: 0%; }

  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    background: var(--paper);
    color: var(--ink);
    font-family: var(--sans);
    font-size: 1rem;
    line-height: 1.65;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 56px 24px;
  }
  ::selection { background: var(--persimmon); color: var(--paper); }

  /* ---- stage: caption + card, sized for the hero's right column ---- */
  .stage { width: 100%; max-width: 460px; }

  .caption {
    font-family: var(--mono);
    font-size: 0.7rem;
    letter-spacing: 0.04em;
    color: var(--muted);
    line-height: 1.6;
    margin: 0 4px 16px;
  }
  .caption b { color: var(--ink); font-weight: 500; }

  /* ---- the card frame (matches .inst in v3.css) ---- */
  .inst {
    border: 1px solid var(--hairline);
    border-radius: 16px;
    background: var(--card);
    box-shadow: 0 1px 2px rgba(26,24,21,0.04), 0 12px 40px rgba(26,24,21,0.06);
    overflow: hidden;
  }
  .inst-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    padding: 12px 18px;
    border-bottom: 1px solid var(--hairline);
    font-family: var(--mono);
    font-size: 0.7rem;
    letter-spacing: 0.06em;
    color: var(--muted);
  }
  .inst-head .live {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    color: var(--signal);
  }
  .inst-head .live i {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--signal);
    animation: breathe 2.4s infinite;
  }
  @keyframes breathe { 0%,100% { opacity: 1; } 50% { opacity: 0.32; } }

  .thread {
    padding: 18px 18px 8px;
    min-height: 396px;
    display: flex;
    flex-direction: column;
  }

  /* ---- generic appear ---- */
  .appear {
    opacity: 0;
    transform: translateY(7px);
  }
  .appear.in {
    opacity: 1;
    transform: none;
    transition: opacity 0.5s var(--settle), transform 0.55s var(--spring);
  }

  /* ---- user message ---- */
  .user {
    align-self: flex-end;
    max-width: 84%;
    background: var(--ink);
    color: var(--paper);
    padding: 9px 15px;
    border-radius: 15px 15px 4px 15px;
    font-size: 0.88rem;
    line-height: 1.5;
    margin-bottom: 16px;
  }

  /* ---- reasoning trace ---- */
  .reason {
    margin-bottom: 14px;
    border: 1px solid var(--hairline);
    border-radius: 12px;
    background: var(--paper);
    overflow: hidden;
  }
  .reason-head {
    display: flex;
    align-items: center;
    gap: 9px;
    width: 100%;
    padding: 10px 13px;
    border: 0;
    background: transparent;
    cursor: pointer;
    font-family: var(--mono);
    font-size: 0.71rem;
    letter-spacing: 0.02em;
    color: var(--muted);
    text-align: left;
  }
  .reason-head .glyph {
    position: relative;
    width: 13px; height: 13px;
    flex: none;
  }
  .reason-head .glyph i {
    position: absolute;
    inset: 0;
    border: 1.5px solid var(--faint);
    border-radius: 50%;
    border-top-color: var(--persimmon);
  }
  .reason.thinking .glyph i { animation: spin 0.9s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .reason.done .glyph i {
    border-color: var(--signal);
    border-top-color: var(--signal);
    animation: none;
  }
  .reason-head .label { flex: 1; }
  .reason-head .chev {
    width: 9px; height: 9px;
    border-right: 1.5px solid var(--faint);
    border-bottom: 1.5px solid var(--faint);
    transform: rotate(45deg);
    transition: transform 0.4s var(--settle);
    margin-right: 2px;
  }
  .reason.collapsed .reason-head .chev { transform: rotate(-45deg); }
  .reason.thinking .reason-head .chev { opacity: 0; }

  .reason-body {
    display: grid;
    grid-template-rows: 1fr;
    transition: grid-template-rows 0.5s var(--settle);
  }
  .reason.collapsed .reason-body { grid-template-rows: 0fr; }
  .reason-body > div {
    overflow: hidden;
    min-height: 0;
  }
  .reason-steps {
    padding: 2px 14px 13px 34px;
    font-size: 0.79rem;
    line-height: 1.55;
    color: var(--faint);
  }
  .reason-steps p {
    margin: 0 0 7px;
    opacity: 0;
    transform: translateX(-4px);
  }
  .reason-steps p.in {
    opacity: 1;
    transform: none;
    transition: opacity 0.45s var(--settle), transform 0.45s var(--settle);
  }
  .reason-steps p:last-child { margin-bottom: 0; }

  /* ---- tool-call chip ---- */
  .tool {
    margin-bottom: 14px;
    border: 1px solid var(--hairline);
    border-radius: 12px;
    background: var(--card);
    overflow: hidden;
  }
  .tool-head {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 13px;
    font-family: var(--mono);
    font-size: 0.71rem;
    color: var(--muted);
  }
  .tool-head .ic {
    width: 22px; height: 22px;
    flex: none;
    display: grid;
    place-items: center;
    border-radius: 7px;
    background: var(--paper);
    border: 1px solid var(--hairline);
    color: var(--muted);
  }
  .tool-head .ic svg { width: 13px; height: 13px; display: block; }
  .tool-head > span:nth-child(2) {
    min-width: 0;
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
  }
  .tool-head .verb { color: var(--ink); }
  .tool-head .arg { color: var(--faint); }
  .tool-head .pill {
    flex: none;
    margin-left: auto;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 0.64rem;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .tool-head .pill .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--signal);
    animation: pulse 1.3s var(--settle) infinite;
  }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(27,127,92,0.34); }
    70% { box-shadow: 0 0 0 6px rgba(27,127,92,0); }
    100% { box-shadow: 0 0 0 0 rgba(27,127,92,0); }
  }
  .tool.done .ic { color: var(--signal); border-color: rgba(27,127,92,0.4); background: rgba(27,127,92,0.06); }
  .tool.done .pill .dot { animation: none; background: var(--signal); }
  .tool.done .pill { color: var(--signal); }

  /* tool result — collapses open while running, tucks to one line when done */
  .tool-body {
    display: grid;
    grid-template-rows: 0fr;
    transition: grid-template-rows 0.5s var(--settle);
  }
  .tool.open .tool-body { grid-template-rows: 1fr; }
  .tool-body > div { overflow: hidden; min-height: 0; }
  .tool-rows {
    padding: 0 13px 11px 45px;
    font-family: var(--mono);
    font-size: 0.7rem;
    line-height: 1.5;
    color: var(--muted);
  }
  .tool-rows .r {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    padding: 3px 0;
    border-top: 1px solid var(--hairline);
    opacity: 0;
    transform: translateY(3px);
  }
  .tool-rows .r.in {
    opacity: 1; transform: none;
    transition: opacity 0.4s var(--settle), transform 0.4s var(--settle);
  }
  .tool-rows .r:first-child { border-top: 0; }
  .tool-rows .r .v { color: var(--ink); }
  .tool-rows .skel {
    height: 9px; border-radius: 4px;
    background: linear-gradient(90deg, var(--hairline) 25%, #efece5 50%, var(--hairline) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.1s linear infinite;
    margin: 6px 0;
  }
  .tool-rows .skel.w1 { width: 70%; } .tool-rows .skel.w2 { width: 52%; }
  @keyframes shimmer { to { background-position: -200% 0; } }

  /* ---- answer ---- */
  .answer {
    font-size: 0.9rem;
    line-height: 1.6;
    color: var(--ink);
    margin-bottom: 14px;
  }
  .answer .caret {
    display: inline-block;
    width: 2px; height: 1.02em;
    vertical-align: -0.18em;
    background: var(--persimmon);
    margin-left: 1px;
    animation: caret 1s steps(1) infinite;
  }
  @keyframes caret { 50% { opacity: 0; } }

  /* ---- inline structured widget: a small rendered "result" ---- */
  .widget {
    margin: 12px 0 2px;
    border: 1px solid var(--hairline);
    border-radius: 12px;
    background: var(--paper);
    overflow: hidden;
    opacity: 0;
    transform: translateY(8px) scale(0.985);
  }
  .widget.in {
    opacity: 1; transform: none;
    transition: opacity 0.55s var(--settle), transform 0.6s var(--spring);
  }
  .widget-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 10px;
    padding: 11px 14px 9px;
  }
  .widget-head .title { font-size: 0.84rem; font-weight: 500; letter-spacing: -0.01em; }
  .widget-head .meta { font-family: var(--mono); font-size: 0.62rem; letter-spacing: 0.05em; color: var(--faint); text-transform: uppercase; }

  .bars { padding: 2px 14px 12px; display: grid; gap: 9px; }
  .bar { display: grid; grid-template-columns: 96px 1fr 52px; align-items: center; gap: 10px; }
  .bar .name { font-size: 0.76rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .bar .track { height: 7px; border-radius: 4px; background: var(--hairline); overflow: hidden; }
  .bar .fill {
    height: 100%;
    border-radius: 4px;
    background: var(--faint);
    width: 0%;
    transition: width 0.9s var(--settle);
  }
  .bar.lead .fill { background: var(--persimmon); }
  .bar .pct { font-family: var(--mono); font-size: 0.72rem; color: var(--ink); text-align: right; }
  .widget-foot {
    border-top: 1px solid var(--hairline);
    padding: 8px 14px;
    font-family: var(--mono);
    font-size: 0.62rem;
    color: var(--faint);
    display: flex;
    align-items: center;
    gap: 7px;
  }
  .widget-foot svg { width: 11px; height: 11px; flex: none; }

  /* ---- charge ledger: dollar line items, with a flagged focal line ---- */
  .ledger { padding: 2px 14px 10px; display: grid; gap: 1px; }
  .ledger .line {
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: baseline;
    gap: 12px;
    padding: 7px 0;
    border-top: 1px solid var(--hairline);
    opacity: 0;
    transform: translateY(4px);
  }
  .ledger .line:first-child { border-top: 0; }
  .ledger .line.in {
    opacity: 1; transform: none;
    transition: opacity 0.45s var(--settle), transform 0.45s var(--settle);
  }
  .ledger .line .lbl { font-size: 0.79rem; color: var(--ink); }
  .ledger .line .sub { display: block; font-size: 0.68rem; color: var(--faint); line-height: 1.45; margin-top: 1px; }
  .ledger .line .amt { font-family: var(--mono); font-size: 0.76rem; color: var(--ink); white-space: nowrap; }

  /* the focal line — the answer to the real question */
  .ledger .line.flag {
    margin: 5px -10px;
    padding: 9px 10px;
    border-top: 0;
    border-radius: 9px;
    background: rgba(232,85,47,0.07);
    box-shadow: inset 0 0 0 1px rgba(232,85,47,0.22);
  }
  .ledger .line.flag .lbl { color: var(--persimmon); font-weight: 500; }
  .ledger .line.flag .sub { color: var(--muted); }
  .ledger .line.flag .amt { color: var(--persimmon); font-weight: 500; }

  /* the total row */
  .ledger .line.total {
    margin-top: 3px;
    padding-top: 10px;
    border-top: 1.5px solid var(--hairline);
  }
  .ledger .line.total .lbl { font-weight: 500; }
  .ledger .line.total .amt { font-size: 0.86rem; font-weight: 500; }

  .followups { display: flex; flex-wrap: wrap; gap: 7px; margin: 6px 0 4px; }
  .fu {
    font-family: var(--mono);
    font-size: 0.69rem;
    border: 1px solid var(--hairline);
    background: transparent;
    border-radius: 999px;
    padding: 6px 12px;
    color: var(--muted);
    cursor: pointer;
    opacity: 0;
    transform: translateY(5px);
    transition: opacity 0.4s var(--settle), transform 0.45s var(--spring), border-color 0.15s, color 0.15s;
  }
  .fu.in { opacity: 1; transform: none; }
  .fu:hover { border-color: var(--persimmon); color: var(--ink); }

  /* ---- composer (docked, with reachable stop) ---- */
  .composer {
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 11px 14px;
    border-top: 1px solid var(--hairline);
  }
  .composer .fake {
    flex: 1;
    height: 34px;
    border-radius: 999px;
    border: 1px solid var(--hairline);
    background: var(--paper);
    display: flex;
    align-items: center;
    padding: 0 15px;
    font-size: 0.82rem;
    color: var(--faint);
  }
  .composer .act {
    width: 34px; height: 34px;
    border-radius: 50%;
    border: 0;
    background: var(--ink);
    color: var(--paper);
    cursor: pointer;
    display: grid;
    place-items: center;
    flex: none;
    transition: background 0.2s, transform 0.2s var(--spring);
  }
  .composer .act svg { width: 14px; height: 14px; }
  .composer .act.stop { background: var(--persimmon); }
  .composer .act.stop svg { width: 11px; height: 11px; }
  .composer .act:hover { transform: scale(1.06); }

  /* replay control */
  .replay {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: var(--mono);
    font-size: 0.66rem;
    letter-spacing: 0.04em;
    color: var(--muted);
    background: transparent;
    border: 0;
    cursor: pointer;
    padding: 0;
  }
  .replay svg { width: 11px; height: 11px; }
  .replay:hover { color: var(--persimmon); }

  /* ---- reduced motion: the finished artifact, fully legible, no motion ---- */
  @media (prefers-reduced-motion: reduce) {
    .appear, .user, .reason, .tool, .answer, .widget, .fu, .reason-steps p, .tool-rows .r, .ledger .line {
      opacity: 1 !important;
      transform: none !important;
      transition: none !important;
    }
    .reason.collapsed .reason-body { grid-template-rows: 1fr; }
    .tool-body { grid-template-rows: 1fr; }
    .bar .fill { transition: none; }
    .inst-head .live i, .reason .glyph i, .tool .pill .dot, .answer .caret, .tool-rows .skel { animation: none; }
  }
</style>
</head>
<body>
  <main class="stage">
    <p class="caption"><b>The kind of agentic support experience I design.</b> One billing question, handled start to finish: the worry acknowledged early, access checked before any detail shows, the full charge pulled and explained, then real options offered. Mock data.</p>

    <section class="inst" aria-label="A live agentic exchange, demonstrated">
      <div class="inst-head">
        <span>billing support</span>
        <span class="live"><i></i>autoplay</span>
      </div>

      <div class="thread" id="thread" role="log" aria-live="polite"></div>

      <div class="composer">
        <span class="fake" id="ghost">Ask anything…</span>
        <button class="act" id="actbtn" type="button" aria-label="Replay the exchange">
          <svg id="acticon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12a7 7 0 1 1 2 4.9"/><path d="M5 12V8m0 4h4"/></svg>
        </button>
      </div>
    </section>
  </main>

<script>
(() => {
  const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const thread = document.getElementById('thread');
  const ghost = document.getElementById('ghost');
  const actbtn = document.getElementById('actbtn');
  const acticon = document.getElementById('acticon');
  let timers = [];
  let running = false;

  const wait = (ms) => new Promise(r => { const t = setTimeout(r, reduce ? 0 : ms); timers.push(t); });
  const clearAll = () => { timers.forEach(clearTimeout); timers = []; };

  const CARD_ICO   = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2.5"/><path d="M3 10h18M7 15h4"/></svg>';
  const SHIELD_ICO = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l7 3v5c0 4.4-3 7.6-7 9-4-1.4-7-4.6-7-9V6z"/><path d="m9 12 2 2 4-4"/></svg>';

  const el = (tag, cls, html) => {
    const n = document.createElement(tag);
    if (cls) n.className = cls;
    if (html != null) n.innerHTML = html;
    return n;
  };

  // stream text token-ish into a node, leaving a caret at the tip
  function streamInto(node, text, speed = 16) {
    return new Promise((resolve) => {
      const caret = el('span', 'caret');
      node.appendChild(caret);
      if (reduce) { node.insertBefore(document.createTextNode(text), caret); caret.remove(); return resolve(); }
      const words = text.split(/(\s+)/);
      let i = 0;
      const step = () => {
        if (i >= words.length) { caret.remove(); return resolve(); }
        node.insertBefore(document.createTextNode(words[i]), caret);
        i++;
        const t = setTimeout(step, speed + Math.random() * speed);
        timers.push(t);
      };
      step();
    });
  }

  async function run() {
    if (running) return;
    running = true;
    thread.innerHTML = '';
    setActState('stop');

    // 1 — customer opens, a little worried about an unexpected charge (all mock)
    const user = el('div', 'user appear', 'I see a $148 charge on my card I don’t recognize. Can you help me understand it?');
    thread.appendChild(user);
    await wait(60); user.classList.add('in');
    await wait(900);

    // 2 — reasoning trace: the agent's judgment, then it tucks to a summary
    const reason = el('div', 'reason thinking appear');
    reason.innerHTML = `
      <button class="reason-head" type="button" aria-expanded="true">
        <span class="glyph"><i></i></span>
        <span class="label">Reasoning</span>
        <span class="chev" aria-hidden="true"></span>
      </button>
      <div class="reason-body"><div><div class="reason-steps"></div></div></div>`;
    thread.appendChild(reason);
    await wait(40); reason.classList.add('in');

    const steps = reason.querySelector('.reason-steps');
    const rhead = reason.querySelector('.reason-head');
    const rlabel = reason.querySelector('.label');
    const STEPS = [
      'Confirm this is the account owner before showing any billing detail.',
      'Pull the full charge, not just the total. An unexpected amount usually means something changed.',
      'Check for anything ending, like a promo or trial, that would raise the price this cycle.',
    ];
    rhead.addEventListener('click', () => toggleReason(reason));

    for (let i = 0; i < STEPS.length; i++) {
      const p = el('p', null, '');
      steps.appendChild(p);
      await wait(30); p.classList.add('in');
      await streamInto(p, STEPS[i], 11);
      await wait(reduce ? 0 : 360);
    }
    await wait(reduce ? 0 : 520);

    // collapse the trace to a one-line summary chip the user can reopen
    rlabel.textContent = 'Thought for 5s';
    reason.classList.remove('thinking');
    reason.classList.add('done');
    if (!reduce) reason.classList.add('collapsed');
    rhead.setAttribute('aria-expanded', reduce ? 'true' : 'false');
    await wait(reduce ? 0 : 480);

    // 3 — tool call: verify the request is allowed before any billing detail shows
    const t1 = el('div', 'tool open appear');
    t1.innerHTML = `
      <div class="tool-head">
        <span class="ic">${SHIELD_ICO}</span>
        <span><span class="verb">Verifying</span> <span class="arg">verify_account_access</span></span>
        <span class="pill"><span class="dot"></span><span class="lbl">Running</span></span>
      </div>
      <div class="tool-body"><div><div class="tool-rows">
        <div class="skel w1"></div>
      </div></div></div>`;
    thread.appendChild(t1);
    await wait(40); t1.classList.add('in');
    await wait(reduce ? 0 : 900);

    const rows1 = t1.querySelector('.tool-rows');
    rows1.innerHTML = '';
    for (const [k, v] of [['role', 'account owner'], ['scope', 'read-only · billing'], ['result', 'verified']]) {
      const r = el('div', 'r', `<span class="k">${k}</span><span class="v">${v}</span>`);
      rows1.appendChild(r);
      await wait(30); r.classList.add('in');
      await wait(reduce ? 0 : 100);
    }
    t1.querySelector('.verb').textContent = 'Verified';
    t1.querySelector('.lbl').textContent = 'Account owner';
    t1.classList.add('done');
    await wait(reduce ? 0 : 700);
    if (!reduce) t1.classList.remove('open'); // tuck closed; user could reopen in a real build
    await wait(reduce ? 0 : 460);

    // 4 — tool call: pull the full charge breakdown (multi-source retrieval)
    const t2 = el('div', 'tool open appear');
    t2.innerHTML = `
      <div class="tool-head">
        <span class="ic">${CARD_ICO}</span>
        <span><span class="verb">Pulling</span> <span class="arg">get_account_charges · this cycle</span></span>
        <span class="pill"><span class="dot"></span><span class="lbl">Running</span></span>
      </div>
      <div class="tool-body"><div><div class="tool-rows">
        <div class="skel w1"></div><div class="skel w2"></div>
      </div></div></div>`;
    thread.appendChild(t2);
    await wait(40); t2.classList.add('in');
    await wait(reduce ? 0 : 1100);

    // the charge breakdown — the focal "intro rate ended" line is what answers the question
    const CHARGES = [
      { lbl: 'Plus plan', sub: 'Base subscription', amt: '$80.00 / mo' },
      { lbl: 'Payroll add-on', sub: 'Files your payroll taxes automatically', amt: '$35.00 / mo' },
      { lbl: 'Payments processing', sub: 'Card fees this month', amt: '$5.00' },
      { lbl: 'Intro rate ended', sub: '6-month welcome discount finished this cycle', amt: '+$28.00', flag: true },
    ];
    const rows2 = t2.querySelector('.tool-rows');
    rows2.innerHTML = '';
    for (const [k, v] of [['line items', '4'], ['change vs. last month', '+$28.00'], ['new total', '$148.00']]) {
      const r = el('div', 'r', `<span class="k">${k}</span><span class="v">${v}</span>`);
      rows2.appendChild(r);
      await wait(30); r.classList.add('in');
      await wait(reduce ? 0 : 90);
    }
    t2.querySelector('.verb').textContent = 'Pulled';
    t2.querySelector('.lbl').textContent = '4 items';
    t2.classList.add('done');
    await wait(reduce ? 0 : 700);
    if (!reduce) t2.classList.remove('open');
    await wait(reduce ? 0 : 440);

    // 5 — warm, reassuring answer, streamed, with the charge breakdown rendered inline
    const ans = el('div', 'answer appear');
    thread.appendChild(ans);
    await wait(40); ans.classList.add('in');

    const pre = el('span', null, '');
    ans.appendChild(pre);
    await streamInto(pre, 'Good news, nothing is wrong, and nothing was added without your say-so. Here is exactly what the $148 covers.', 15);

    // inline rendered widget (a real charge breakdown, not a wall of text)
    const widget = el('div', 'widget');
    widget.innerHTML = `
      <div class="widget-head">
        <span class="title">Charge breakdown · this cycle</span>
        <span class="meta">Card ending 4417</span>
      </div>
      <div class="ledger"></div>
      <div class="widget-foot">${SHIELD_ICO}<span>Mock data · read-only · verified account owner</span></div>`;
    ans.appendChild(widget);
    await wait(40); widget.classList.add('in');

    const ledger = widget.querySelector('.ledger');
    const buildLine = (c, cls) => {
      const line = el('div', 'line' + (cls ? ' ' + cls : ''));
      line.innerHTML = `
        <span><span class="lbl">${c.lbl}</span>${c.sub ? `<span class="sub">${c.sub}</span>` : ''}</span>
        <span class="amt">${c.amt}</span>`;
      return line;
    };
    CHARGES.forEach((c) => ledger.appendChild(buildLine(c, c.flag ? 'flag' : '')));
    ledger.appendChild(buildLine({ lbl: 'New total', amt: '$148.00' }, 'total'));

    // reveal the lines on a gentle stagger, the flagged line lands as the focal point
    const lines = ledger.querySelectorAll('.line');
    for (let i = 0; i < lines.length; i++) {
      const t = setTimeout(() => lines[i].classList.add('in'), reduce ? 0 : i * 130);
      timers.push(t);
    }
    await wait(reduce ? 0 : lines.length * 130 + 360);

    // close the explanation with empathy and the real reason it went up
    const post = el('span', null, '');
    ans.appendChild(post);
    await streamInto(post, ' The reason it is higher than last month is the line in orange: your 6-month intro discount finished this cycle, which we flagged on last month’s statement. Everything else is the same plan you already had.', 15);

    await wait(reduce ? 0 : 760);

    // 7 — follow-up turn: a worried clarification, handled with empathy and real options
    const user2 = el('div', 'user appear', 'I didn’t realize the discount was ending. Is there any way to lower it?');
    thread.appendChild(user2);
    await wait(40); user2.classList.add('in');
    await wait(reduce ? 0 : 760);

    const ans2 = el('div', 'answer appear');
    thread.appendChild(ans2);
    await wait(40); ans2.classList.add('in');
    const a2 = el('span', null, '');
    ans2.appendChild(a2);
    await streamInto(a2, 'Totally fair, that one is easy to miss. A few ways to bring it down: switch to annual billing and save about 15%, drop Payments if you are not taking card payments right now, or I can connect you with a specialist to review the whole plan. Want me to walk through any of these?', 15);

    // 8 — follow-up suggestions appear, settling in
    const fus = el('div', 'followups');
    const FU = ['Switch to annual billing', 'Remove Payments', 'Talk to a specialist'];
    FU.forEach((f) => fus.appendChild(el('button', 'fu', f)));
    thread.appendChild(fus);
    await wait(reduce ? 0 : 120);
    [...fus.children].forEach((b, i) => {
      const t = setTimeout(() => b.classList.add('in'), reduce ? 0 : i * 90);
      timers.push(t);
    });

    await wait(reduce ? 0 : 500);
    setActState('replay');
    running = false;
  }

  function toggleReason(reason) {
    const open = reason.classList.toggle('collapsed');
    reason.querySelector('.reason-head').setAttribute('aria-expanded', open ? 'false' : 'true');
  }

  function setActState(mode) {
    if (mode === 'stop') {
      acticon.innerHTML = '<rect x="6" y="6" width="12" height="12" rx="2.2" fill="currentColor" stroke="none"/>';
      actbtn.classList.add('stop');
      actbtn.setAttribute('aria-label', 'Stop generating');
      ghost.textContent = 'Generating…';
    } else {
      acticon.innerHTML = '<path d="M5 12a7 7 0 1 1 2 4.9"/><path d="M5 12V8m0 4h4"/>';
      actbtn.classList.remove('stop');
      actbtn.setAttribute('aria-label', 'Replay the exchange');
      ghost.textContent = 'Ask anything…';
    }
  }

  actbtn.addEventListener('click', () => {
    if (running) {
      clearAll();
      running = false;
      setActState('replay');
    } else {
      clearAll();
      run();
    }
  });

  // autoplay on load
  run();
})();
</script>
</body>
</html>
